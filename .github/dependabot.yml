# Dependabot keeps Go module and GitHub Actions dependencies current so
# security fixes show up as PRs rather than slipping past. Each ecosystem
# is grouped into one weekly PR so bumps share a single lockfile change
# instead of stacking conflicting updates.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-modules:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
